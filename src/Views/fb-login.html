<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect Meta Ads | APIs Hub</title>
    <meta name="app-env" content="demo">
    <link rel="icon" type="image/png" href="/driver-assets/core/images/apishub-favicon.png">
    
    <!-- Design System & Dependencies -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/driver-assets/core/css/main.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/driver-assets/core/navbar.js"></script>
    <script src="/driver-assets/core/footer.js"></script>

    <link rel="stylesheet" href="/assets/css/login.css">
</head>
</head>
<body>

    <div class="login-wrapper">
        <div class="auth-card">
            <div class="logo-section">
                <img src="/assets/images/apishub-trans-light-600.png" alt="APIs Hub">
                <div class="secure-tag">
                    <i data-lucide="shield-check" style="width: 14px;"></i> Verified Provider
                </div>
            </div>

            <h2>Connect Meta Ads</h2>
            <p class="description">
                Grant APIs Hub <strong>secure access</strong> to your campaign data. 
                We request read-only permissions for performance reporting.
            </p>

            <a href="/fb-auth-start" class="fb-action-btn">
                <i data-lucide="facebook" style="fill: #fff; width: 22px; height: 22px;"></i>
                Continue with Facebook
            </a>

            <div class="legal-notice">
                By connecting, you agree to our 
                <br>
                <a href="/privacy">Privacy Policy</a> & 
                <a href="/tos">Terms of Service</a>
                
                <div class="partnership">
                    <i data-lucide="award" style="width: 12px;"></i> Official Marketing API Integration
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
